name: Build 3DSMate

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup devkitPro
        uses: devkitPro/action-devkitpro@v1
        with:
          pacman: >
            devkitARM
            libctru
            3ds-dev
            3ds-jansson
            makerom
            bannertool

      - name: Show environment
        run: |
          echo "DEVKITPRO=$DEVKITPRO"
          echo "DEVKITARM=$DEVKITARM"
          find "$DEVKITPRO" -name 3ds.mk || true
          find "$DEVKITPRO" -name base_rules || true

      - name: Build
        run: |
          make clean
          make

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: 3DSMate
          path: |
            *.3dsx
            *.elf
            *.smdh
            *.cia
