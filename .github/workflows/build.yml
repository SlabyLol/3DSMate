name: Build 3DSMate

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    container:
      image: devkitpro/devkitarm:latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show environment
        run: |
          echo "DEVKITPRO=$DEVKITPRO"
          echo "DEVKITARM=$DEVKITARM"
          ls -la $DEVKITPRO
          ls -la $DEVKITPRO/libctru || true

      - name: Install 3DS libraries
        run: |
          dkp-pacman -Sy --noconfirm
          dkp-pacman -S --needed --noconfirm \
            3ds-dev \
            3ds-portlibs \
            3ds-jansson

      - name: Verify installation
        run: |
          test -f "$DEVKITPRO/3ds.mk"
          test -f "$DEVKITPRO/base_rules"
          echo "Everything installed correctly."

      - name: Clean
        run: |
          make clean || true

      - name: Build
        env:
          DEVKITPRO: /opt/devkitpro
          DEVKITARM: /opt/devkitpro/devkitARM
        run: |
          make \
            DEVKITPRO=/opt/devkitpro \
            DEVKITARM=/opt/devkitpro/devkitARM

      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: 3DSMate
          path: |
            *.3dsx
            *.elf
            *.smdh
            *.cia
