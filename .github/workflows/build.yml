name: Build 3DSMate

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build .3dsx and .cia
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            build-essential cmake git wget \
            imagemagick sox \
            libyaml-dev zstd xz-utils

      # Download verified packages directly from the community mirror.
      # All URLs confirmed from https://wii.leseratte10.de/devkitPro/
      - name: Install devkitARM + 3DS libs from mirror
        run: |
          MIRROR="https://wii.leseratte10.de/devkitPro"
          DKP="/opt/devkitpro"
          sudo mkdir -p "$DKP"

          pkg_xz()  { wget -q "$1" -O /tmp/p.xz  && sudo tar -xf /tmp/p.xz  -C "$DKP" --exclude='.PKGINFO' --exclude='.INSTALL' 2>/dev/null; rm -f /tmp/p.xz;  }
          pkg_zst() { wget -q "$1" -O /tmp/p.zst && sudo tar -xf /tmp/p.zst -C "$DKP" --exclude='.PKGINFO' --exclude='.INSTALL' 2>/dev/null; rm -f /tmp/p.zst; }

          # devkitARM r65 toolchain (87MB)
          pkg_zst "$MIRROR/devkitARM/r65%20(2024-08-30)/devkitARM-r65-1-linux_x86_64.pkg.tar.zst"

          # devkitarm-crtls — provides 3ds.mk, 3dsx.specs, crt0.o
          pkg_xz  "$MIRROR/devkitARM/devkitarm-rules/devkitarm-crtls-1.2.1-1-any.pkg.tar.xz"

          # libctru 2.0.1 — core 3DS homebrew library
          pkg_xz  "$MIRROR/libctru/2020/libctru-2.0.1-1-any.pkg.tar.xz"

          # 3ds-cmake — cmake toolchain file for cross-compiling
          pkg_zst "$MIRROR/cmake/3ds-cmake-1.5.1-1-any.pkg.tar.zst"

          # 3ds-jansson — JSON library
          pkg_xz  "$MIRROR/3ds/3ds-jansson-2.13-1-any.pkg.tar.xz"

          # 3ds-mbedtls — HTTPS support
          pkg_xz  "$MIRROR/3ds/3ds-mbedtls-2.16.2-1-any.pkg.tar.xz"

          echo "--- devkitpro layout ---"
          ls "$DKP/"
          echo "--- looking for 3ds.mk ---"
          find "$DKP" -name "3ds.mk" 2>/dev/null

      - name: Set environment
        run: |
          echo "DEVKITPRO=/opt/devkitpro"               >> $GITHUB_ENV
          echo "DEVKITARM=/opt/devkitpro/devkitARM"     >> $GITHUB_ENV
          echo "/opt/devkitpro/tools/bin"                >> $GITHUB_PATH
          echo "/opt/devkitpro/devkitARM/bin"            >> $GITHUB_PATH

      - name: Build makerom
        run: |
          git clone --depth 1 https://github.com/3DSGuy/Project_CTR.git /tmp/ctr
          cd /tmp/ctr/makerom
          make deps
          make -j$(nproc)
          sudo cp bin/makerom /usr/local/bin/makerom

      - name: Build bannertool
        run: |
          git clone --depth 1 https://github.com/carstene1ns/3ds-bannertool.git /tmp/bannertool
          cmake -B /tmp/bannertool/build /tmp/bannertool -DCMAKE_BUILD_TYPE=Release
          cmake --build /tmp/bannertool/build -j$(nproc)
          sudo cp /tmp/bannertool/build/bannertool /usr/local/bin/bannertool

      - name: Prepare meta assets
        run: |
          mkdir -p meta
          if [ ! -f meta/icon.png ]; then
            convert -size 48x48 xc:"#1a1a2e" \
              -fill "#00d4ff" -font DejaVu-Sans-Bold -pointsize 12 \
              -gravity center -annotate 0 "3DS\nMate" meta/icon.png
          fi
          if [ ! -f meta/banner.png ]; then
            convert -size 256x128 xc:"#1a1a2e" \
              -fill "#00d4ff" -font DejaVu-Sans-Bold -pointsize 20 \
              -gravity center -annotate 0 "3DSMate\nAI Chat via Groq" meta/banner.png
          fi
          if [ ! -f meta/audio.wav ]; then
            sox -n -r 22050 -c 1 -b 16 meta/audio.wav trim 0.0 3.0
          fi

      - name: Build 3DSMate.3dsx
        run: make

      - name: Build 3DSMate.cia
        run: |
          smdhtool --create \
            "3DSMate" "AI Chat powered by Groq" "3DSMate Project" \
            meta/icon.png 3DSMate.smdh

          bannertool makebanner \
            -i meta/banner.png -a meta/audio.wav -o 3DSMate.bnr

          bannertool makesmdh \
            -s "3DSMate" -l "AI Chat powered by Groq" -p "3DSMate Project" \
            -i meta/icon.png -o 3DSMate.icn

          makerom \
            -f cia -o 3DSMate.cia -elf 3DSMate.elf \
            -rsf meta/3DSMate.rsf -banner 3DSMate.bnr -icon 3DSMate.icn \
            -major 1 -minor 0 -micro 0

          echo "3dsx: $(du -sh 3DSMate.3dsx)"
          echo " cia: $(du -sh 3DSMate.cia)"

      - name: Upload 3DSMate.3dsx
        uses: actions/upload-artifact@v4
        with:
          name: 3DSMate-3dsx
          path: 3DSMate.3dsx
          retention-days: 30

      - name: Upload 3DSMate.cia
        uses: actions/upload-artifact@v4
        with:
          name: 3DSMate-cia
          path: 3DSMate.cia
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            3DSMate.3dsx
            3DSMate.cia
          body: |
            ## 3DSMate – AI Chat for Nintendo 3DS

            | File | Use for |
            |------|---------|
            | `3DSMate.3dsx` | Homebrew Launcher (no CFW needed) |
            | `3DSMate.cia` | HOME Menu install via FBI (CFW required) |

            ### Install .3dsx
            Copy `3DSMate.3dsx` to `/3ds/3DSMate/3DSMate.3dsx` on your SD card and open via Homebrew Launcher.

            ### Install .cia
            Copy `3DSMate.cia` to your SD card and install with **FBI**.

            ### First launch
            Press **X** to enter your [Groq API key](https://console.groq.com) — saved automatically.

            ### Controls
            | Button | Action |
            |--------|--------|
            | A | Send message / Start chat |
            | B | Back / Save & exit chat |
            | X | Clear history / Enter API key |
            | Y | Delete chat (in chat list) |
            | ↑↓ | Navigate chat list |
            | START | Quit app |
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
