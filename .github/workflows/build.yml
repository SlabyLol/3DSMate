name: Build 3DSMate

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build .3dsx and .cia
    runs-on: ubuntu-latest
    # devkitpro/devkitarm = gba/ds/3ds/gp32/gp2x environment
    container:
      image: devkitpro/devkitarm:latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies + 3DS SDK
        run: |
          apt-get update -q
          apt-get install -y \
            build-essential cmake git \
            imagemagick sox \
            libyaml-dev

          # Install 3ds-dev via apt — avoids dkp-pacman which 403s from CI
          # The devkitpro apt repo is already configured in this image
          apt-get install -y devkitpro-3ds || true

          # Fallback: install 3ds tools directly from the dkp apt mirror
          if [ ! -f /opt/devkitpro/3ds.mk ]; then
            apt-get install -y -t stable devkitpro-3ds 2>/dev/null || true
          fi

          # Last resort: try dkp-pacman with a timeout
          if [ ! -f /opt/devkitpro/3ds.mk ]; then
            dkp-pacman --noconfirm -S 3ds-dev 3ds-jansson 2>/dev/null || true
          fi

          ls /opt/devkitpro/3ds.mk 2>/dev/null && echo "3ds.mk found!" || echo "WARNING: 3ds.mk missing"

      - name: Build jansson for 3DS
        run: |
          if [ ! -f /opt/devkitpro/portlibs/3ds/lib/libjansson.a ]; then
            git clone --depth 1 https://github.com/akheron/jansson.git /tmp/jansson
            mkdir /tmp/jansson/build && cd /tmp/jansson/build
            cmake .. \
              -DCMAKE_TOOLCHAIN_FILE=/opt/devkitpro/cmake/3DS.cmake \
              -DJANSSON_BUILD_SHARED_LIBS=OFF \
              -DJANSSON_WITHOUT_TESTS=ON \
              -DJANSSON_EXAMPLES=OFF \
              -DCMAKE_INSTALL_PREFIX=/opt/devkitpro/portlibs/3ds
            make -j$(nproc)
            make install
          else
            echo "jansson already installed"
          fi

      - name: Build makerom
        run: |
          git clone --depth 1 https://github.com/3DSGuy/Project_CTR.git /tmp/ctr
          cd /tmp/ctr/makerom
          make deps
          make -j$(nproc)
          cp bin/makerom /usr/local/bin/makerom

      - name: Build bannertool
        run: |
          git clone --depth 1 https://github.com/carstene1ns/3ds-bannertool.git /tmp/bannertool
          cmake -B /tmp/bannertool/build /tmp/bannertool -DCMAKE_BUILD_TYPE=Release
          cmake --build /tmp/bannertool/build -j$(nproc)
          cp /tmp/bannertool/build/bannertool /usr/local/bin/bannertool

      - name: Prepare meta assets
        run: |
          mkdir -p meta

          if [ ! -f meta/icon.png ]; then
            convert -size 48x48 xc:"#1a1a2e" \
              -fill "#00d4ff" -font DejaVu-Sans-Bold -pointsize 12 \
              -gravity center -annotate 0 "3DS\nMate" \
              meta/icon.png
          fi

          if [ ! -f meta/banner.png ]; then
            convert -size 256x128 xc:"#1a1a2e" \
              -fill "#00d4ff" -font DejaVu-Sans-Bold -pointsize 20 \
              -gravity center -annotate 0 "3DSMate\nAI Chat via Groq" \
              meta/banner.png
          fi

          if [ ! -f meta/audio.wav ]; then
            sox -n -r 22050 -c 1 -b 16 meta/audio.wav trim 0.0 3.0
          fi

      - name: Build 3DSMate.3dsx
        run: make

      - name: Build 3DSMate.cia
        run: |
          smdhtool --create \
            "3DSMate" \
            "AI Chat powered by Groq" \
            "3DSMate Project" \
            meta/icon.png \
            3DSMate.smdh

          bannertool makebanner \
            -i meta/banner.png \
            -a meta/audio.wav \
            -o 3DSMate.bnr

          bannertool makesmdh \
            -s "3DSMate" \
            -l "AI Chat powered by Groq" \
            -p "3DSMate Project" \
            -i meta/icon.png \
            -o 3DSMate.icn

          makerom \
            -f cia \
            -o 3DSMate.cia \
            -elf 3DSMate.elf \
            -rsf meta/3DSMate.rsf \
            -banner 3DSMate.bnr \
            -icon 3DSMate.icn \
            -major 1 -minor 0 -micro 0

          echo "3dsx: $(du -sh 3DSMate.3dsx)"
          echo " cia: $(du -sh 3DSMate.cia)"

      - name: Upload 3DSMate.3dsx
        uses: actions/upload-artifact@v4
        with:
          name: 3DSMate-3dsx
          path: 3DSMate.3dsx
          retention-days: 30

      - name: Upload 3DSMate.cia
        uses: actions/upload-artifact@v4
        with:
          name: 3DSMate-cia
          path: 3DSMate.cia
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            3DSMate.3dsx
            3DSMate.cia
          body: |
            ## 3DSMate – AI Chat for Nintendo 3DS

            | File | Use for |
            |------|---------|
            | `3DSMate.3dsx` | Homebrew Launcher (no CFW needed) |
            | `3DSMate.cia` | HOME Menu install via FBI (CFW required) |

            ### Install .3dsx
            Copy `3DSMate.3dsx` to `/3ds/3DSMate/3DSMate.3dsx` on your SD card and open via Homebrew Launcher.

            ### Install .cia
            Copy `3DSMate.cia` to your SD card and install with **FBI**. The app appears on your HOME menu.

            ### First launch
            Press **X** to enter your [Groq API key](https://console.groq.com) — saved automatically.

            ### Controls
            | Button | Action |
            |--------|--------|
            | A | Send message / Start chat |
            | B | Back / Save & exit chat |
            | X | Clear history / Enter API key |
            | Y | Delete chat (in chat list) |
            | ↑↓ | Navigate chat list |
            | START | Quit app |
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
